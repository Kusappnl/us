<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #ffe4e1; /* Soft pink */
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        h1 {
            color: #d63384;
            font-size: 3rem;
            text-align: center;
        }

        .container {
            text-align: center;
        }

        .buttons {
            margin-top: 50px;
            position: relative;
            width: 300px;
            height: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #yesBtn {
            background-color: #ff4d6d;
            color: white;
            position: absolute;
            left: 0;
        }

        #noBtn {
            background-color: #6c757d;
            color: white;
            position: absolute;
            right: 0;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hey bestie, will you be my girlfriend? ❤️</h1>
        <div class="buttons">
            <button id="yesBtn" onclick="celebrate()">Yes!</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');

        // This makes the button "run away"
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = ${x}px;
            noBtn.style.top = ${y}px;
            noBtn.style.position = 'fixed';
        });

        function celebrate() {
            alert("Yay! I'm the luckiest person alive! 🥰");
            document.body.innerHTML = "<h1>Can't wait for our first date! 🌹✨</h1>";
            document.body.style.backgroundColor = "#ffccd5";
        }
    </script>
</body>
</html>
